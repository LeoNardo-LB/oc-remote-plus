<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link id="theme-css" rel="stylesheet" href="highlight/github-dark.min.css">
    <script src="highlight/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: var(--bg-color, #1e1e1e);
        }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            -webkit-user-select: text;
            user-select: text;
            overflow-x: auto;
            padding: 8px;
            color: var(--text-color, #e0e0e0);
        }
        .container { display: flex; }
        .gutter {
            text-align: right;
            padding-right: 12px;
            color: #6b7280;
            user-select: none;
            -webkit-user-select: none;
            white-space: pre;
            flex-shrink: 0;
        }
        .code-area { flex: 1; overflow-x: auto; }
        pre { margin: 0; white-space: pre; }
        pre code {
            font-family: inherit !important;
            padding: 0 !important;
            background: transparent !important;
        }
        .hljs { background: transparent !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="gutter" id="gutter"></div>
        <div class="code-area">
            <pre><code id="code" class="hljs"></code></pre>
        </div>
    </div>
    <script>
        function setCode(code, lang) {
            var codeEl = document.getElementById('code');
            codeEl.textContent = code;
            if (lang && hljs.getLanguage(lang)) {
                codeEl.className = 'hljs language-' + lang;
            } else {
                codeEl.className = 'hljs';
            }
            hljs.highlightElement(codeEl);
            var lines = code.split('\n');
            var gutter = document.getElementById('gutter');
            gutter.textContent = lines.map(function(_, i) { return (i + 1); }).join('\n');
        }
        function setTheme(isDark) {
            var link = document.getElementById('theme-css');
            link.href = isDark ? 'highlight/github-dark.min.css' : 'highlight/github.min.css';
            document.documentElement.style.setProperty('--bg-color', isDark ? '#1e1e1e' : '#ffffff');
            document.documentElement.style.setProperty('--text-color', isDark ? '#e0e0e0' : '#1e1e1e');
        }
    </script>
</body>
</html>
