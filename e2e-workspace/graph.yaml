name: e2e-walker
description: "AI 测试员工作流 — 四阶段 DAG 驱动的端到端测试技能"

settings:
  max_concurrency: 1
  max_retry: 3
  default_dep: hard
  default_mode: fast

nodes:
  tool-detect:
    label: "工具检测"
    mode: fast
    goal: "检测可用工具（CDP/ADB/curl/源码），生成 tool_manifest"
    gates: [checklist_complete, summary_non_empty]

  explore:
    label: "探索"
    mode: full
    goal: "派发探索 SA，分析目标应用，生成 test-plan.md"
    gates: [checklist_complete, summary_non_empty, files_exist]

  review-plan:
    label: "规划审查"
    mode: full
    goal: "主 Agent 审查 test-plan.md，覆盖自查，补充遗漏项"
    gates: [checklist_complete, summary_non_empty]

  next-item:
    label: "下一测试项"
    mode: fast
    goal: "读取 test-plan.md，找到下一个待执行测试项。有则路由到 run-item，无则路由到 report"
    gates: [checklist_complete, summary_non_empty, route_valid]
    route:
      - {target: run-item, condition: has-next}
      - {target: report, condition: all-done}

  run-item:
    label: "执行测试项"
    mode: full
    goal: "派发执行 SA 执行当前测试项，写回结果，收集证据"
    gates: [checklist_complete, summary_non_empty]

  report:
    label: "生成报告"
    mode: full
    goal: "派发报告 SA，汇总所有测试结果，生成 test-report.md"
    gates: [checklist_complete, summary_non_empty, files_exist]

  validate:
    label: "验证"
    mode: full
    goal: "最终验证：报告完整性、覆盖度、修复留痕"
    gates: [checklist_complete, summary_non_empty, route_valid]
    route:
      - {target: archive, condition: pass}
      - {target: report, condition: retry-report}

  archive:
    label: "归档"
    mode: single
    goal: "归档运行状态，输出完成摘要"
    gates: [checklist_complete, summary_non_empty]

edges:
  # Phase 1: Explore
  - {from: tool-detect, to: explore}
  # Phase 1 → Phase 2
  - {from: explore, to: review-plan}
  # Phase 2 → Phase 3
  - {from: review-plan, to: next-item}
  # Phase 3: loop
  - {from: next-item, to: run-item, condition: has-next}
  - {from: next-item, to: report, condition: all-done}
  - {from: run-item, to: next-item, condition: continue, max_retry: 200}
  # Phase 3 → Phase 4
  # (already covered by next-item → report)
  # Phase 4: Report
  - {from: report, to: validate}
  # Validation routing
  - {from: validate, to: archive, condition: pass}
  - {from: validate, to: report, condition: retry-report, max_retry: 2}
