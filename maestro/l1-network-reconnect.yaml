appId: dev.minios.ocremote.dev
name: L1 - Network Reconnect
tags:
  - layer1
  - network
  - manual
---

# This flow requires manual network toggle
# Launch app
- launchApp

# Wait for content
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# Take screenshot - before network toggle
- takeScreenshot: l1_before_network_off

# INSTRUCTION: User should toggle airplane mode at this point
# Wait 5 seconds for network loss detection
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000

# Take screenshot - after network loss
- takeScreenshot: l1_after_network_off

# INSTRUCTION: User should toggle airplane mode off
# Wait for network recovery and reconnect
- extendedWaitUntil:
    visible: ".*"
    timeout: 30000

# Take screenshot - after network recovery
- takeScreenshot: l1_after_network_recovery
